name: Android APK Build

on:
  workflow_dispatch: # Allows you to trigger this manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Unzip Project Files
      run: |
        unzip Cacano-game-main.zip
        # Move everything out of the subfolder into the root directory
        mv Cacano-game-main/* . || true
        mv Cacano-game-main/.* . || true

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: app/build/outputs/apk/debug/app-debug.apk
